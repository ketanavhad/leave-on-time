<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transit Decision System</title>

<style>
:root {
  --bg: #0b0b0d;
  --card: #15151a;
  --text: #f0f0f0;
  --sub: #9a9aa0;
  --accent: #7b1e2b;
  --accent2: #a83244;
}

body {
  margin: 0;
  padding: 28px;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 760px;
  margin: auto;
}

h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 18px;
}

/* ---------------- DECISION ---------------- */

.decision {
  background: var(--card);
  padding: 16px;
  margin-bottom: 14px;
  border-left: 4px solid var(--accent);
}

.secondary {
  opacity: 0.7;
  border-left: 4px solid var(--accent2);
}

.title {
  font-size: 11px;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--sub);
}

.big {
  font-size: 18px;
  font-weight: 700;
}

.small {
  font-size: 12px;
  color: var(--sub);
  margin-top: 6px;
}

/* ---------------- TIMETABLE ---------------- */

.section {
  margin-top: 22px;
}

.section-title {
  font-size: 11px;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--sub);
  margin-bottom: 10px;
}

.row {
  display: grid;
  grid-template-columns: 70px 1fr 80px;
  padding: 10px;
  background: var(--card);
  border-left: 3px solid transparent;
  margin-bottom: 6px;
  opacity: 0.7;
}

.row.best {
  border-left: 4px solid var(--accent);
  opacity: 1;
}

.time {
  font-variant-numeric: tabular-nums;
  font-weight: 700;
}

.route {
  font-size: 13px;
}

.count {
  text-align: right;
  font-size: 12px;
  color: var(--sub);
}

/* ---------------- ANIMATION ---------------- */

.fade {
  animation: fadeIn 0.35s ease both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<h2>Transit Decision System</h2>

<div id="decision"></div>

<div class="section">
  <div class="section-title">Next trains — Alexanderplatz</div>
  <div id="alexList"></div>
</div>

<div class="section">
  <div class="section-title">Next trains — Samariterstraße</div>
  <div id="samList"></div>
</div>

<script>

/* ---------------- CONFIG ---------------- */

const CONFIG = {
  alex: {
    stopId: "900100003",
    name: "Alexanderplatz",
    walk: 7,
    directions: ["hönow", "kaulsdorf"]
  },
  samariter: {
    stopId: "900120009",
    name: "Samariterstraße",
    walk: 9,
    directions: ["hauptbahnhof"]
  }
};

/* ---------------- API ---------------- */

async function fetchDepartures(id) {
  try {
    const r = await fetch(
      `https://v6.bvg.transport.rest/stops/${id}/departures?products=subway&lines=U5&results=60&duration=100`
    );
    const d = await r.json();
    return d.departures || [];
  } catch {
    return [];
  }
}

/* ---------------- FILTER ---------------- */

function filter(deps, kws) {
  kws = kws.map(k => k.toLowerCase());

  return deps.filter(d => {
    const dir = (d.direction || "").toLowerCase();
    const dest = (d.destination?.name || "").toLowerCase();
    return kws.some(k => dir.includes(k) || dest.includes(k));
  });
}

/* ---------------- TIME ---------------- */

const mins = t => Math.round((new Date(t) - new Date()) / 60000);

function label(t) {
  const m = mins(t);
  if (m <= 0) return "NOW";
  if (m < 60) return `${m} min`;
  return `${Math.floor(m/60)}h`;
}

/* ---------------- BEST ---------------- */

function bestOption(deps, walk, station) {
  const valid = deps
    .map(d => ({ ...d, m: mins(d.when), station, walk }))
    .filter(d => d.m >= walk);

  if (!valid.length) return null;

  valid.sort((a, b) => a.m - b.m);
  return valid[0];
}

/* ---------------- DECISION ---------------- */

function buildDecision(a, s) {
  const list = [a, s].filter(Boolean);
  list.sort((x, y) => (x.m - x.walk) - (y.m - y.walk));

  return {
    primary: list[0] || null,
    secondary: list[1] || null
  };
}

/* ---------------- RENDER DECISION ---------------- */

function renderDecision(d) {
  const el = document.getElementById("decision");

  const block = (item, sec=false) => {
    if (!item) return "";

    const leaveIn = item.m - item.walk;

    return `
      <div class="decision fade ${sec ? "secondary" : ""}">
        <div class="title">${item.station}</div>

        <div class="big">
          ${sec ? "Alternative → " : "GO → "}
          Leave in ${leaveIn} min
        </div>

        <div class="small">
          Next train in ${label(item.when)}
        </div>
      </div>
    `;
  };

  el.innerHTML = `
    ${block(d.primary)}
    ${block(d.secondary, true)}
  `;
}

/* ---------------- RENDER LIST ---------------- */

function renderList(id, deps) {
  const el = document.getElementById(id);

  el.innerHTML = deps.slice(0, 4).map(d => `
    <div class="row fade">
      <div class="time">${label(d.when)}</div>
      <div class="route">U5 → ${d.direction || d.destination?.name}</div>
      <div class="count">${new Date(d.when).toLocaleTimeString([], {
        hour:"2-digit",
        minute:"2-digit"
      })}</div>
    </div>
  `).join("");
}

/* ---------------- LOAD ---------------- */

async function load() {
  const a = await fetchDepartures(CONFIG.alex.stopId);
  const s = await fetchDepartures(CONFIG.samariter.stopId);

  const alex = filter(a, CONFIG.alex.directions);
  const sam = filter(s, CONFIG.samariter.directions);

  const alexBest = bestOption(alex, CONFIG.alex.walk, CONFIG.alex.name);
  const samBest = bestOption(sam, CONFIG.samariter.walk, CONFIG.samariter.name);

  renderDecision(buildDecision(alexBest, samBest));

  renderList("alexList", alex);
  renderList("samList", sam);
}

/* ---------------- INIT ---------------- */

load();
setInterval(load, 30000);

</script>

</body>
</html>
