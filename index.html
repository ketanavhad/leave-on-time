<!DOCTYPE html>
<html>
<head>
  <link rel="manifest" href="manifest.json">	
  <title>Next Trains</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .train { margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; }
  </style>
</head>
<body>

<h2>Next 3 Trains (U8 / BVG)</h2>

<div id="trains">Loading...</div>

<script>
async function loadTrains() {
  const url = "https://v6.bvg.transport.rest/stops/900100003/departures?products=subway&lines=U8&direction=900120001&results=3&duration=30";

  try {
    const res = await fetch(url);
    const data = await res.json();

    const container = document.getElementById("trains");
    container.innerHTML = "";

    data.departures.slice(0, 3).forEach(dep => {
      const time = new Date(dep.when).toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      });

      const div = document.createElement("div");
      div.className = "train";

      div.innerHTML = `
        <strong>${dep.line.name}</strong><br/>
        Direction: ${dep.direction}<br/>
        Time: ${time}
      `;

      container.appendChild(div);
    });

  } catch (err) {
    document.getElementById("trains").innerText = "Error loading data";
    console.error(err);
  }
}

loadTrains();
setInterval(loadTrains, 30000); // refresh every 30 sec
</script>

</body>
</html>
