<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>U5 Live Board</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Arial, sans-serif;
      padding: 14px;
      background: #0f1115;
      color: #e8e8e8;
      max-width: 520px;
      margin: auto;
    }

    h2 {
      font-size: 20px;
      margin: 8px 0 16px;
      font-weight: 600;
    }

    h3 {
      font-size: 15px;
      font-weight: 500;
      color: #b7b7b7;
      margin: 18px 0 10px;
    }

    .section {
      margin-bottom: 18px;
    }

    .train {
      background: #1a1d24;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 10px;
      border-left: 4px solid #3a3f4b;
      box-shadow: 0 1px 6px rgba(0,0,0,0.25);
    }

    .line {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
    }

    .time {
      font-size: 14px;
      margin-top: 4px;
      font-weight: 500;
    }

    .small {
      color: #9aa0a6;
      font-size: 12px;
      margin-top: 2px;
    }

    @media (max-width: 420px) {
      body { padding: 10px; }
      .train { padding: 10px; }
      .line { font-size: 15px; }
    }
  </style>
</head>

<body>

<h2>U5 – Live Departures</h2>

<div class="section">
  <h3>→ Hönow (from Alexanderplatz)</h3>
  <div id="honow">Loading…</div>
</div>

<div class="section">
  <h3>→ Hauptbahnhof (from Samariterstr.)</h3>
  <div id="hbf">Loading…</div>
</div>

<script>

/* ---------- CONFIG ---------- */

const CONFIG = {
  honow: {
    stopId: "900100003", // Alexanderplatz
    directions: ["hönow", "kaulsdorf"] // include short-turn trains
  },
  hbf: {
    stopId: "900120009", // Samariterstr.
    directions: ["hauptbahnhof"]
  }
};

/* ---------- API ---------- */

async function fetchDepartures(stopId) {
  const url = `https://v6.bvg.transport.rest/stops/${stopId}/departures?products=subway&lines=U5&results=60&duration=100`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    return data.departures || [];
  } catch (err) {
    console.error("Fetch error:", err);
    return [];
  }
}

/* ---------- FILTER ---------- */

function filterU5ByDirection(deps, keywords) {
  const kws = keywords.map(k => k.toLowerCase());

  return deps.filter(dep => {
    if (dep.line?.name !== "U5") return false;

    const dir = (dep.direction || "").toString().toLowerCase();
    const dest = (dep.destination?.name || "").toLowerCase();

    return kws.some(kw => dir.includes(kw) || dest.includes(kw));
  });
}

/* ---------- TIME UTILS ---------- */

function getMinutesUntil(timeString) {
  return Math.round((new Date(timeString) - new Date()) / 60000);
}

function formatTime(dateString) {
  const d = new Date(dateString);
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

/* ---------- RENDER ---------- */

function renderList(containerId, departures) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  if (!departures.length) {
    container.innerHTML = "<i style='color:#aaa'>No U5 trains found</i>";
    return;
  }

  departures.slice(0, 4).forEach(dep => {
    const mins = getMinutesUntil(dep.when);
    const time = formatTime(dep.when);

    const label = mins <= 0 ? "NOW" : `in ${mins} min`;

    let color = "#4caf50";
    if (mins <= 3) color = "#ff4d4d";
    else if (mins <= 6) color = "#ffb300";

    const direction =
      dep.direction?.name ||
      dep.direction ||
      dep.destination?.name ||
      "U5";

    const div = document.createElement("div");
    div.className = "train";

    div.innerHTML = `
      <div class="line">U5 → ${direction}</div>
      <div class="time" style="color:${color}">${label}</div>
      <div class="small">
        ${time}
        ${dep.delay ? `(+${Math.round(dep.delay / 60)} min)` : ""}
      </div>
    `;

    container.appendChild(div);
  });
}

/* ---------- MAIN ---------- */

async function loadAll() {
  const deps1 = await fetchDepartures(CONFIG.honow.stopId);
  const honowTrains = filterU5ByDirection(deps1, CONFIG.honow.directions);
  renderList("honow", honowTrains);

  const deps2 = await fetchDepartures(CONFIG.hbf.stopId);
  const hbfTrains = filterU5ByDirection(deps2, CONFIG.hbf.directions);
  renderList("hbf", hbfTrains);
}

loadAll();
setInterval(loadAll, 30000);

</script>

</body>
</html>
